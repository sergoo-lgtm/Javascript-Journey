<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Sidebar Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="btn-open hide" id="open">☰ Menu</button>

    <div class="sidebar">
        <button id="close">✖</button>
        <nav class="menu">
            <p>🏠 Home</p>
            <p>📚 Courses</p>
            <p>📰 News</p>
            <p>💡 Problem Solving</p>
            <p>📝 Quizzes</p>
            <p>💬 Chat</p>
        </nav>
    </div>

    <div class="content">
        <h1>Welcome to My Page</h1>
        <p>Explore the menu on the left. Click the close button to hide it, and reopen it using the "Menu" button.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
